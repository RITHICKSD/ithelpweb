<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex IT Support — Login Portal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .login-bg {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 0;
    }

    .login-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
    }

    .login-orb-1 {
      width: 600px;
      height: 600px;
      background: var(--primary);
      top: -200px;
      right: -100px;
    }

    .login-orb-2 {
      width: 400px;
      height: 400px;
      background: var(--accent);
      bottom: -100px;
      left: -100px;
    }

    .login-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(37, 99, 235, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(37, 99, 235, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .login-box {
      width: 100%;
      max-width: 440px;
      padding: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      z-index: 1;
      animation: formAppear 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes formAppear {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    [data-theme="light"] .login-box {
      background: rgba(255, 255, 255, 0.9);
    }

    .login-logo-centered {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .login-header {
      margin-bottom: 32px;
    }

    .login-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .login-tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .login-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      background: transparent;
      border: none;
      font-family: inherit;
    }

    .login-tab.active {
      background: var(--primary);
      color: #FFFFFF;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 7px;
      letter-spacing: 0.3px;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
      transition: var(--transition);
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .form-control::placeholder {
      color: var(--text-muted);
    }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .remember {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.83rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .remember input {
      accent-color: var(--primary);
    }

    .forgot-link {
      font-size: 0.83rem;
      color: var(--primary);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #FFFFFF;
      font-weight: 800;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 20px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(37, 99, 235, 0.4);
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .login-divider span {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .sso-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      margin-bottom: 10px;
    }

    .sso-btn:hover {
      border-color: var(--primary);
      background: rgba(37, 99, 235, 0.05);
    }

    .register-form {
      display: none;
    }

    .login-footer {
      margin-top: 32px;
      text-align: center;
    }

    .login-footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
    }

    .login-footer-links a {
      font-size: 0.78rem;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .login-footer-links a:hover {
      color: var(--primary);
    }

    /* Theme controls on login */
    .login-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    [dir="rtl"] .login-controls {
      right: auto;
      left: 20px;
    }

    @media(max-width:480px) {
      .login-box {
        padding: 24px;
        margin: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="login-bg"></div>
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-grid"></div>

  <div class="login-controls">
    <button class="ctrl-btn" data-dir-toggle>LTR</button>
    <button class="ctrl-btn" data-theme-toggle><i data-lucide="sun" class="theme-icon"></i></button>
  </div>

  <div class="login-box">
    <div class="login-logo-centered">
      <a href="index.html" class="logo">
        <div class="logo-icon">A</div><span class="logo-text">Apex<span>IT</span></span>
      </a>
    </div>

    <div class="login-header text-center">
      <div class="login-title">Welcome Back</div>
      <div class="login-sub">Sign in to your Apex IT client portal</div>
    </div>

        <!-- Tabs -->
        <div class="login-tabs">
          <button class="login-tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
          <button class="login-tab" id="tab-register" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form class="login-form" id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-email">Work Email</label>
            <input class="form-control" id="login-email" type="email" placeholder="you@company.com"
              autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input class="form-control" id="login-password" type="password" placeholder="••••••••••"
              autocomplete="current-password" />
          </div>
          <div class="login-options">
            <label class="remember"><input type="checkbox" /> Remember me</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button type="button" class="login-btn" onclick="doLogin()">Sign In to Portal →</button>
          <div class="login-divider"><span>or continue with</span></div>
          <button type="button" class="sso-btn"><i data-lucide="mail" style="width:16px;height:16px"></i> Sign in with Google</button>
          <button type="button" class="sso-btn"><i data-lucide="facebook" style="width:16px;height:16px"></i> Sign in with Facebook</button>
        </form>

        <!-- Register Form -->
        <form class="register-form" id="register-form" novalidate>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input class="form-control" type="text" placeholder="John" />
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input class="form-control" type="text" placeholder="Smith" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Work Email</label>
            <input class="form-control" type="email" placeholder="you@company.com" />
          </div>
          <div class="form-group">
            <label class="form-label">Company</label>
            <input class="form-control" type="text" placeholder="Your Company" />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" placeholder="Min 8 characters" />
          </div>
          <button type="button" class="login-btn">Create Account →</button>
          <div class="login-divider"><span>or register with</span></div>
          <button type="button" class="sso-btn"><i data-lucide="mail" style="width:16px;height:16px"></i> Sign up with Google</button>
          <button type="button" class="sso-btn"><i data-lucide="facebook" style="width:16px;height:16px"></i> Sign up with Facebook</button>
        </form>

        <div class="login-footer">

          <div class="login-footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="contact.html">Get Help</a>
          </div>
        </div>
      </div>

  <script src="header.js"></script>
  <script>
    function showTab(tab) {
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const loginTitle = document.querySelector('.login-title');
      const loginSub = document.querySelector('.login-sub');

      if (tab === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        if (loginTitle) loginTitle.textContent = 'Welcome Back';
        if (loginSub) loginSub.textContent = 'Sign in to your Apex IT client portal';
      } else {
        registerForm.style.display = 'block';
        loginForm.style.display = 'none';
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        if (loginTitle) loginTitle.textContent = 'Join Apex IT';
        if (loginSub) loginSub.textContent = 'Create your enterprise account';
      }
    }
    function doLogin() {
      window.location.href = 'user-dashboard.html';
    }
    // Initial state
    document.getElementById('register-form').style.display = 'none';
  </script>
</body>

</html>
